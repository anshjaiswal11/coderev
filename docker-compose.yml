version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: coderev-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: coderev

  redis:
    image: redis:7-alpine
    container_name: coderev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
